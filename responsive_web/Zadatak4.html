<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .body{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    div{
        text-align: center;
        font-size: 100px;
        color: white;
    }
    .grid-container{
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 1fr 6fr 2fr 2fr 2fr;
        gap: 0px;
        height: 100vh;
        width: 100vw;
    }
    .Header{
        background-color: black;
        grid-column: 1 / 2;
        grid-row: 1 / 2;
    }
    .Menu{
        background-color: red;
        grid-column: 2 / 5;
        grid-row: 1 / 2;
    }
    .Hero{
        background-color: lightskyblue;
        grid-column: 1 / 5;
        grid-row: 2 / 3;
    }
    .Main{
        background-color: darkblue;
        grid-column: 1 / 3;
        grid-row: 3 / 5;
    }
    .Image{
        background-color: lightgreen;
        grid-column: 4 / 5;
        grid-row: 3 / 4;
    }
    .Extra{
        background-color: green;
        grid-column: 4 / 5;
        grid-row: 4 / 5;
    }
    .Banner{
        background-color: yellow;
        grid-column: 1 / 5;
        grid-row: 5 / 6;
    }

    @media(max-width: 1060px){
        .grid-container{
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 4fr 4fr 2fr 2fr;
            gap: 0px;
        }
        .Header{
            grid-column: 1 / 4;
            grid-row: 1 / 2;
        }
        .Hero{
            grid-column: 1 / 4;
            grid-row: 2 / 3;
        }
        .Menu{
            grid-column: 1/2;
            grid-row: 3/6;
        }
        .Main{
            grid-column: 2/4;
            grid-row: 3/4;
        }
        .Banner{
            grid-column: 2/4;
            grid-row: 4/5;
        }
        .Extra{
            grid-column: 2/3;
            grid-row: 5/6;
        }
        .Image{
            grid-column: 3/4;
            grid-row: 5/6;
        }

        @media(max-width: 600px){
            .grid-container{
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 100px 100px 300px 300px 200px 200px 200px;
                gap: 0px;
            }
            .Header{
                grid-column: 1 / 2;
                grid-row: 1 / 2;
            }
            .Menu{
                grid-column: 1/2;
                grid-row: 2/3;
            }
            .Hero{
                grid-column: 1/2;
                grid-row: 3/4;
            }
            .Main{
                grid-column: 1/2;
                grid-row: 4/5;
            }
            .Image{
                grid-column: 1/2;
                grid-row: 7/8;
            }
            .Extra{
                grid-column: 1/2;
                grid-row: 6/7;
            }
             .Banner{
                grid-column: 1/2;
                grid-row: 5/6;
             }
         }
    }
</style>


<body>
    <div class="grid-container">
        <div class="Header">Header</div>
        <div class="Menu">Menu</div>
        <div class="Hero">Hero</div>
        <div class="Main">Main</div>
        <div class="Image">Image</div>
        <div class="Extra">Extra</div>
        <div class="Banner">Banner</div>
    </div>
</body>
</html>
