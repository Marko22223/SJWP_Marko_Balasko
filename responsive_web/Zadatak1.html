<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 0;
    }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
    }
    .pravokutnik1, .pravokutnik2, .pravokutnik3, .pravokutnik4 {
        padding: 5px;
        text-align: center;
        font-size: 100px;
        height: 100vh;
        width: 100%;
    }
    .pravokutnik1 {
        background-color: red;
    }
    .pravokutnik2 {
        background-color: blue;
    }
    .pravokutnik3 {
        background-color: green;
    }
    .pravokutnik4 {
        background-color: yellow;
    } 

    @media (max-width: 760px) {
        .grid-container {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(2, 1fr);

        }
        .pravokutnik1, .pravokutnik2, .pravokutnik3, .pravokutnik4 {
            height: 50vh;
        }
    }
    @media (max-width: 580px) {
        .grid-container {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(4, 1fr);
        }
        .pravokutnik1, .pravokutnik2, .pravokutnik3, .pravokutnik4 {
            height: 25vh;
        }
    }
</style>

<body>
    <div class="grid-container">
        <div class="pravokutnik1">1</div>
        <div class="pravokutnik2">2</div>
        <div class="pravokutnik3">3</div>
        <div class="pravokutnik4">4</div>
    </div>
</body>
</html>
