<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 5px;
    }
    .container{
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 15% 40% 30% 15%;
        gap: 10px;
        height: 100vh;
        width: 100vw;
    }
    .orange{
        background-color: orange;
    }
    .green{
        background-color: green;
    }
    .blue{
        background-color: blue;
    }
    .grey{
        background-color: grey;
    }
    .o1{
        grid-column: 1 / 3;
        grid-row: 1 / 2;
    }
    .o2{
        grid-column: 3 / 5;
        grid-row: 1 / 2;
    }
    .green{
        grid-column: 1 / 5;
        grid-row: 2 / 3;
    }
    .grid-container{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(1, 1fr);
        gap: 10px;
        grid-column: 1 / 5;
        grid-row: 3 / 4;
    }
    .g1{
        grid-column: 1 / 2;
        grid-row: 4 / 5;
    }
    .g2{
        grid-column: 2 / 3;
        grid-row: 4 / 5;
    }
    .g3{
        grid-column: 3 / 4;
        grid-row: 4 / 5;
    }
    .g4{
        grid-column: 4 / 5;
        grid-row: 4 / 5;
    }

    @media(max-width: 768px){
        .container{
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: 1fr 1fr 2fr 2.5fr 1fr 1fr;
        }
        .o1{
            grid-column: 1 / 3;
            grid-row: 1 / 2;
        }
        .o2{
            grid-column: 1 / 3;
            grid-row: 2 / 3;
        }
        .green{
            grid-column: 1 / 3;
            grid-row: 3 / 4;
        }
        .grid-container{
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, 1fr);
            grid-column: 1 / 3;
            grid-row: 4 / 5;
        }
        .g1{
            grid-column: 1 / 2;
            grid-row: 5 / 6;
        }
        .g2{
            grid-column: 2 / 3;
            grid-row: 5 / 6;
        }
        .g3{
            grid-column: 1/ 2;
            grid-row: 6 / 7;
        }
        .g4{
            grid-column: 2 / 3;
            grid-row: 6 / 7;
        }
    }

    @media(max-width: 320px){
        .container{
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr 1.5fr 6fr 1fr 1fr 1fr 1fr;
        }
        .o1{
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }
        .o2{
            grid-column: 1 / 2;
            grid-row: 2 / 3;
        }
        .green{
            grid-column: 1 / 2;
            grid-row: 3 / 4;
        }
        .grid-container{
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, 1fr);
            grid-column: 1 / 2;
            grid-row: 4 / 5;
        }
        .g1{
            grid-column: 1 / 2;
            grid-row: 5 / 6;
        }
        .g2{
            grid-column: 1 / 2;
            grid-row: 6 / 7;
        }
        .g3{
            grid-column: 1/ 2;
            grid-row: 7 / 8;
        }
        .g4{
            grid-column: 1 / 2;
            grid-row: 8 / 9;
        }
    }
</style>

<body>
    <div class="container">
        <div class="orange o1"></div>
        <div class="orange o2"></div>
        <div class="green"></div>
        <div class="grid-container">
            <div class="blue"></div>
            <div class="blue"></div>
            <div class="blue"></div>
        </div>
        <div class="grey g1"></div>
        <div class="grey g2"></div>
        <div class="grey g3"></div>
        <div class="grey g4"></div>
    </div>
</body>
</html>

</body>
</html>
