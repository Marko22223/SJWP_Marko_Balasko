<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 5px;
    }
    .container{
        display: grid;
        grid-template-columns: repeat(4, 25%);
        grid-template-rows: repeat(7, 5.9%);
        gap: 10px;

    }

    .orange1, .orange2, .green, .flexcontainer, .grey1,.grey2,.grey3,.grey4{
        height: 100vh;
        width: 100vh;
    }
    .orange1, .orange2{
        background-color: orange;
    }
    .green{
        background-color: green;
        grid-column: 1/6;   
        grid-row: 2/5;
    }
    .grey1, .grey2, .grey3, .grey4{
        background-color: grey;
    }
    .blue{
        background-color: blue;
    }

    .orange1{
        grid-column: 1/3;
    }
    .orange2{
        grid-column: 3/5;
        grid-row:1/2;
    }
</style>

<body>
    <div class="container">
        <div class="orange1"></div>
        <div class="orange2"></div>
        <div class="green"></div>
        <div class="flex-container">
            <div class="blue"></div>
            <div class="blue"></div>
            <div class="blue"></div>
        </div>
        <div class="grey1"></div>
        <div class="grey2"></div>
        <div class="grey3"></div>
        <div class="grey4"></div>
    </div>
</body>
</html>
