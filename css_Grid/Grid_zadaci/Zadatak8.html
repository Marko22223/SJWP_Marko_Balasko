<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .container{
        margin-top: 200px;
        height: 50vh;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: 1fr 1fr;
        gap: 30px;
    }

    div{
        padding: 10px;
        border-radius: 10px;
        font-size: 50px;
        color: white;

    }
    .A{
        background-color: rgb(59, 59, 59);
    }
    .B{
        background-color: grey;
    }
</style>

<body>
    <div class="container">
        <div class="A">1</div>
        <div class="B">2</div>
        <div class="A">3</div>
        <div class="B">4</div>
        <div class="A">5</div>
        <div class="B">6</div>
        <div class="A">7</div>
        <div class="B">8</div>
        <div class="A">9</div>
        <div class="B">10</div>
        <div class="A">11</div>
        <div class="B">12</div>
    </div>
</body>
</html>
