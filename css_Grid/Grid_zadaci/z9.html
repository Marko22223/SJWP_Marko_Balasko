<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>


<style>
    .container{
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: 1fr 1fr 1fr;
        gap: 25px;
        background-color: white;
    }
    div{
        padding: 30px;
        border-radius: 20px;
        font-size: 50px;
        color: white;  
        background-color: darkslategrey;
    }
    .A{
        grid-column: 1/3 ;
    }
    .B{
        grid-column: 3/6;
    }
    .D{
        grid-column: 2/5;
        grid-row: 2/3;
    }
    .E{
        grid-column: 1/6;
    }
    .F{
        background-color: lightskyblue;
        opacity: 0.9;
        grid-area: 2/3/3/6;
    }
    
</style>

<body>
    <div class="container">
        <div class="A">A</div>
        <div class="B">B</div>
        <div class="C">C</div>
        <div class="D">D</div>
        <div class="E">E</div>
        <div class="F">F</div>
    </div>
</body>
</html>
