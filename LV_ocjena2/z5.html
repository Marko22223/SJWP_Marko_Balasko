<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 0;
    }
    div{
        text-align: center;
        background-color: bisque;
        width: 100%;
        height: 100%;
    }
    .container{
        background-color: white;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(4,1fr);
        grid-template-rows: 1fr 1fr;
        gap: 10px;
    }
    .Kartica1{
        grid-column: 1/4;
    }
    @media(max-width: 768px){
        .container{
            grid-template-columns: 1fr;
            grid-template-rows: 1.5fr repeat(5,1fr);
        }
        .Kartica1{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .Kartica2{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .Kartica3{
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .Kartica4{
            grid-column: 1/2;
            grid-row: 4/5;
        }
        .Kartica5{
            grid-column: 1/2;
            grid-row: 5/6;
        }
        .Kartica6{
            grid-column: 1/2;
            grid-row: 6/7;
        }
    }
</style>

<body>
    <div class="container">
        <div class="Kartica1">Kartica1 Zauzima 2 stupca na dekstopu</div>
        <div class="Kartica2">Kartica2</div>
        <div class="Kartica3">Kartica3</div>
        <div class="Kartica4">Kartica4</div>
        <div class="Kartica5">Kartica5</div>
        <div class="Kartica6">Kartica6</div>
    </div>
</body>
</html>
