<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 0px;
    }
    .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 10px;
        width: 100vw;
        height: 100vh;
        background-color: bisque;
    }
    .Proizvod1{background-color: aliceblue;}
    .Proizvod2{background-color: beige;}
    .Proizvod3{background-color:  whitesmoke;}
    .Proizvod4{background-color: violet;}
    .Proizvod5{background-color: darkcyan;}
    .Proizvod6{background-color: darkgoldenrod;}
    .Proizvod7{background-color: darkkhaki;}
    .Proizvod8{background-color: darkred;}
    .Proizvod9{background-color: darkmagenta;}
    .Proizvod10{background-color: greenyellow;}
    .Proizvod11{background-color: plum;}
    .Proizvod12{background-color: darkorange;}
    
    
    @media (max-width: 1023px){
        .container{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

    }
    @media (max-width: 768px){
        .container{
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            grid-template-rows: repeat(12, 1fr);
        }

    }

    
</style>

<body>
    <div class="container">
        <div class="Proizvod1">Slika 1</div>
        <div class="Proizvod2">Slika 2</div>
        <div class="Proizvod3">Slika 3</div>
        <div class="Proizvod4">Slika 4</div>
        <div class="Proizvod5">Slika 5</div>
        <div class="Proizvod6">Slika 6</div>
        <div class="Proizvod7">Slika 7</div>
        <div class="Proizvod8">Slika 8</div>
        <div class="Proizvod8">Slika 9</div>
        <div class="Proizvod8">Slika 10</div>
        <div class="Proizvod8">Slika 11</div>
        <div class="Proizvod8">Slika 12</div>
    </div>    
</body>
</html>
