<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        margin: 0;
    }
    div{
        text-align: center;
        background-color: bisque;
        width: 100%;
        height: 100%;
    }
    .container{
        background-color: white;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(5,1fr);
        grid-template-rows: 1fr;
        gap: 10px;
    }

    @media (max-width: 1023px){
        .container{
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
        }
        .Zadaci{
            grid-column: 1/3;
            grid-row: 3/4;
        }
    }
    @media (max-width: 768px){
        .container{
            grid-template-columns: 1fr;
            grid-template-rows: repeat(5,1fr);
        }
        .Korisnici{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .Prodajai{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .Poruke{
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .Konverzija{
            grid-column: 1/2;
            grid-row: 4/5;
        }
        .Zadaci{
            grid-column: 1/2;
            grid-row: 5/6;
        }
    }
    
</style>

<body>
    <div class="container">
        <div class="Korisnici">Korisnici</div>
        <div class="Prodaja">Prodaja</div>
        <div class="Poruke">Poruke</div>
        <div class="Konverzija">Konverzija</div>
        <div class="Zadaci">Zadaci</div>
    </div>    
</body>
</html>
