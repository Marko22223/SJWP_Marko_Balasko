<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        border: 1px solid black;
        padding: 5px;
        text-align: center;
        font-size: 100px;
    }

    .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 99%;
            height: 100vh;
    }
    .a {
        grid-column: 1/4;
    }
    .b {
        grid-column: 1/3;
        grid-row: 2/4;
    }
    .c {
        grid-column: 3/4;
        grid-row: 2/4;
    }

    @media (max-width: 480px) {
        .container {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(4, 1fr);
        }
        .a {
            grid-column: 1/2;
        }
        .b {
            grid-column: 1/2;
            grid-row: 2/4;
        }
        .c {
            grid-column: 1/2;
            grid-row: 4/5;
        }
    }
</style>

<body>
    <div class="container">
        <div class="a">A</div>
        <div class="b">B</div>
        <div class="c">C</div>
    </div>


</body>
</html>
